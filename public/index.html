<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>療養介護サービス提供実績記録票</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ログインオーバーレイ -->
<div id="login-overlay" class="login-overlay hidden">
  <div class="login-box">
    <h2>ログイン</h2>
    <p class="login-title">療養介護サービス提供実績記録票</p>
    <div id="login-error" class="login-error hidden"></div>
    <label>ユーザー名
      <input type="text" id="login-username" autocomplete="username">
    </label>
    <label>パスワード
      <input type="password" id="login-password" autocomplete="current-password">
    </label>
    <button onclick="doLogin()" class="btn-primary login-btn">ログイン</button>
  </div>
</div>

<header>
  <h1>療養介護サービス提供実績記録票</h1>
  <nav id="main-nav">
    <button onclick="showPage('input')" class="nav-btn" id="nav-input">日次入力</button>
    <button onclick="showPage('summary')" class="nav-btn" id="nav-summary">月次集計</button>
    <button onclick="showPage('master')" class="nav-btn" id="nav-master">マスタ管理</button>
  </nav>
  <div class="header-user">
    <span id="header-username"></span>
    <button onclick="doLogout()" class="btn-logout">ログアウト</button>
  </div>
</header>

<main>
  <!-- 日次入力ページ -->
  <section id="page-input" class="page">
    <div class="input-layout">
      <div class="input-sidebar">
        <div id="ward-buttons" class="ward-buttons"></div>
        <div class="date-row">
          <label>対象月</label>
          <input type="month" id="sel-month" onchange="loadInputForm()">
        </div>
        <div id="patient-list" class="patient-list"></div>
      </div>
      <div class="input-main">
        <div id="input-form"></div>
      </div>
    </div>
  </section>

  <!-- 月次集計ページ -->
  <section id="page-summary" class="page hidden">
    <div class="toolbar">
      <select id="sum-ward" onchange="loadSummaryPatients()"><option value="">病棟を選択</option></select>
      <input type="month" id="sum-month">
      <button onclick="loadSummary()" class="btn-primary">集計表示</button>
    </div>
    <div id="summary-table"></div>
  </section>

  <!-- マスタ管理ページ -->
  <section id="page-master" class="page hidden">
    <div class="tab-bar">
      <button onclick="showMasterTab('patients')" class="tab-btn active" id="mtab-patients">患者管理</button>
      <button onclick="showMasterTab('items')" class="tab-btn" id="mtab-items">物品管理</button>
      <button onclick="showMasterTab('prices')" class="tab-btn" id="mtab-prices">日用品単価</button>
      <button onclick="showMasterTab('users')" class="tab-btn" id="mtab-users">ユーザー管理</button>
    </div>
    <div id="master-patients" class="master-tab"></div>
    <div id="master-items" class="master-tab hidden"></div>
    <div id="master-prices" class="master-tab hidden"></div>
    <div id="master-users" class="master-tab hidden"></div>
  </section>
</main>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div id="modal-content"></div>
    <div class="modal-footer">
      <button onclick="closeModal()" class="btn-secondary">閉じる</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
